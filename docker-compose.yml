services:
  backend:
    build:
      context: .
      target: runtime
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  streamlit:
    build:
      context: .
      target: runtime
    env_file:
      - .env
    environment:
      INTAKE_API_URL: http://backend:8000
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - backend
    command: streamlit run demo/streamlit_demo.py --server.address 0.0.0.0 --server.port 8501
